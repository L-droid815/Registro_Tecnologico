<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./estilo.css">
    <title>Página de registro</title>
</head>
<body>

    <div class="contenedor-padre">

        <div class="registro">

            <img src="./imagenes/IMG-20260602-WA0027.jpg" alt="Logo Universidad" class="logo-universidad">

            <h1>Inicio de sesión</h1>

            <input type="text" id="nombre" placeholder="Nombre">

            <input type="text" id="apellido" placeholder="Apellido">

            <input type="text" id="cedula" placeholder="Cédula">

            <input type="text" id="notas" placeholder="Notas por unidad">

            <input type="text" id="asistencias" placeholder="Asistencias en total">

            <input type="password" id="password" placeholder="Ingrese su contraseña">

            <button id="btnGuardar">OK</button>

            <button id="btnPassword">Cambiar la contraseña</button>
        </div>
    </div>
        
    <script src="./index.js"></script>
</body>
</html>
